<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="67kDcUOYXg8DViOahWqOcfUFTa4Yi_2sbaeIoRbucMU" />
    <title>{% block title %}Crossword Answer Lookup{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="Find crossword answers and definitions. Search 500,000+ cryptic and quick crossword clues.">
    {% endblock %}
    {% block structured_data %}{% endblock %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, 'Times New Roman', serif; background: #fafaf8; color: #2d2d2d; line-height: 1.6; }
        a { color: #1a5276; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .wrap { max-width: 720px; margin: 0 auto; padding: 0 1rem; }
        header { background: #1a5276; color: white; padding: 0.75rem 0; }
        header a { color: white; }
        header .wrap { display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        main { padding: 1.5rem 0; }
        .card { background: white; border: 1px solid #e0ddd8; border-radius: 6px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
        .clue-text { font-size: 1.15rem; color: #333; margin-bottom: 0.75rem; }
        .answer { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.15em; font-family: 'Courier New', monospace; color: #1a5276; }
        .definition { color: #555; margin-top: 0.5rem; }
        .meta { font-size: 0.85rem; color: #888; margin-top: 0.75rem; }
        .badge { display: inline-block; background: #e8e4df; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.8rem; color: #555; }
        footer { border-top: 1px solid #e0ddd8; padding: 1rem 0; text-align: center; font-size: 0.8rem; color: #999; }
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 0.3rem 0.7rem; border: 1px solid #ddd; border-radius: 3px; font-size: 0.85rem; }
        .pagination span.current { background: #1a5276; color: white; border-color: #1a5276; }
        .clue-list { list-style: none; }
        .clue-list li { padding: 0.6rem 0; border-bottom: 1px solid #f0ede8; }
        .clue-list li:last-child { border-bottom: none; }
        .clue-list .ans { font-family: 'Courier New', monospace; font-weight: 700; color: #1a5276; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <header>
        <div class="wrap">
            <h1><a href="/">Crossword Answer Lookup</a></h1>
            <span style="font-size:0.85rem; opacity:0.7">500k+ clues</span>
        </div>
    </header>
    <main>
        <div class="wrap">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="wrap">&copy; 2026 Crossword Answer Lookup</div>
    </footer>
</body>
</html>
