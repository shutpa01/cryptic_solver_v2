{% extends "base.html" %}

{% block title %}Puzzles — Cordelia{% endblock %}
{% block meta %}
<meta name="description" content="Browse cryptic crossword puzzles from the Telegraph, Times, Guardian and Independent. Answers and explanations by Cordelia.">
{% endblock %}

{% block content %}
<h1 class="text-2xl font-brand font-bold text-gray-900 mb-2">Puzzles</h1>
<p class="text-gray-500 mb-6">Pick a publication. I'll walk you through the clues.</p>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    {% for source, type_slug, label in sources %}
    <a href="/{{ source }}/{{ type_slug }}/"
       class="group block bg-white rounded-xl border border-gray-100 p-5 hover:border-indigo-300 hover:shadow-md transition">
        <div class="text-lg font-bold text-gray-800 group-hover:text-indigo-600 transition">{{ label }}</div>
        <div class="text-sm text-gray-400 mt-1">{{ source | title }}</div>
    </a>
    {% endfor %}
</div>
{% endblock %}
