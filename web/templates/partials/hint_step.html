{# HTMX fragment — returned by POST /reveal, swapped into #hints-<id> #}
<div class="mt-2 space-y-2">
    {% for hint in revealed %}
    <div class="rounded px-3 py-2 text-sm
        {% if hint.type == 'answer' %}bg-indigo-50 border border-indigo-200
        {% elif hint.type == 'definition' %}bg-green-50 border border-green-200
        {% elif hint.type == 'wordplay_type' %}bg-amber-50 border border-amber-200
        {% else %}bg-gray-50 border border-gray-200{% endif %}">
        <span class="font-medium text-gray-600">{{ hint.label }}:</span>
        {% if hint.type == 'wordplay_type' %}
        <span>{{ hint.content | wordplay_label }}</span>
        {% elif hint.type == 'answer' %}
        <span class="font-bold tracking-wider uppercase">{{ hint.content }}</span>
        {% else %}
        <span>{{ hint.content }}</span>
        {% endif %}
    </div>
    {% endfor %}
</div>
