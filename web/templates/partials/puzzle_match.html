<div class="bg-indigo-50 border border-indigo-200 rounded-lg p-4">
    <div class="flex items-start gap-3">
        <img src="/static/cordelia.jpg" alt="Cordelia" class="w-9 h-9 rounded-full object-cover object-top shrink-0 mt-0.5">
        <div>
            {% for m in matches %}
            <p class="text-sm text-gray-800 {% if not loop.first %}mt-2{% endif %}">
                Working on <strong>{{ m.source_name }} #{{ m.puzzle_number }}</strong>?
                I've got all {{ m.total }} clues with hints and explanations.
            </p>
            <a href="{{ m.url }}"
               class="inline-flex items-center gap-1.5 mt-1 text-sm font-medium text-indigo-600 hover:text-indigo-800">
                <span>See the full puzzle</span>
                <span>&rarr;</span>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
