{# Replaces the buttons row after admin re-run. Returns full button set. #}
{% for s in steps %}
<button hx-post="/reveal"
        hx-vals='{"token": "{{ token }}", "step": "{{ s.step }}"}'
        hx-target="#hints-{{ clue.id }}"
        hx-swap="innerHTML"
        class="text-xs px-2.5 py-1 rounded border font-medium cursor-pointer
            {% if s.type == 'definition' %}border-green-300 text-green-700 hover:bg-green-50
            {% elif s.type == 'wordplay_type' %}border-amber-300 text-amber-700 hover:bg-amber-50
            {% elif s.type == 'explanation' %}border-gray-300 text-gray-600 hover:bg-gray-50
            {% elif s.type == 'answer' %}border-indigo-300 text-indigo-700 hover:bg-indigo-50
            {% endif %}">
    {{ s.label }}
</button>
{% endfor %}
{% if steps | length > 1 %}
<button hx-post="/reveal"
        hx-vals='{"token": "{{ token }}", "step": "all"}'
        hx-target="#hints-{{ clue.id }}"
        hx-swap="innerHTML"
        class="text-xs px-2.5 py-1 rounded border border-purple-300 text-purple-700 hover:bg-purple-50 font-medium cursor-pointer">
    Show all
</button>
{% endif %}
<button onclick="hideHints('hints-{{ clue.id }}')"
        class="hint-hide text-xs px-2.5 py-1 rounded border border-red-200 text-red-400 hover:bg-red-50 font-medium cursor-pointer hidden">
    Hide
</button>
<button hx-get="/admin/edit/{{ clue.id }}"
        hx-target="#hints-{{ clue.id }}"
        hx-swap="innerHTML"
        class="text-xs px-2.5 py-1 rounded border border-orange-300 text-orange-700 hover:bg-orange-50 font-medium cursor-pointer">
    Edit
</button>
<button hx-post="/admin/rerun/{{ clue.id }}"
        hx-target="#explain-{{ clue.id }}"
        hx-swap="innerHTML"
        hx-indicator="#rerun-spinner-{{ clue.id }}"
        class="text-xs px-2.5 py-1 rounded border border-sky-300 text-sky-700 hover:bg-sky-50 font-medium cursor-pointer">
    Re-run
</button>
<span id="rerun-spinner-{{ clue.id }}" class="htmx-indicator text-xs text-sky-500">Running...</span>
<span class="text-xs font-mono px-1.5 py-0.5 rounded shrink-0
    {% if solve_source == 'S' %}bg-blue-100 text-blue-700
    {% elif solve_source == 'SE' %}bg-cyan-100 text-cyan-700
    {% elif solve_source == 'P' %}bg-orange-100 text-orange-700
    {% else %}bg-gray-100 text-gray-400{% endif %}">{{ solve_source }}</span>
<span class="tier-{{ tier | lower }} text-xs font-medium px-2 py-0.5 rounded shrink-0">
    {{ tier }}
</span>
<button onclick="var el=document.getElementById('enrich-{{ clue.id }}');el.style.display=el.style.display==='none'?'block':'none'"
        class="text-xs px-2.5 py-1 rounded border border-violet-300 text-violet-700 hover:bg-violet-50 font-medium cursor-pointer">
    DB+
</button>
