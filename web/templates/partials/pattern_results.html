{# HTMX fragment — returned by GET /helper/pattern #}
<div class="space-y-3 text-sm">

    <div class="flex items-center justify-between">
        <span class="font-medium text-gray-700">
            Pattern: <span class="font-bold font-mono tracking-wider">{{ pattern }}</span>
            ({{ total_letters }} letters)
        </span>
        <span class="text-xs text-gray-400">{{ matches | length }} result{{ 's' if matches | length != 1 }}</span>
    </div>

    {% if matches %}
    <div class="rounded px-3 py-2 bg-emerald-50 border border-emerald-200">
        <div class="flex flex-wrap gap-x-4 gap-y-1">
            {% for word in matches %}
            <span class="font-mono text-gray-800 tracking-wide cursor-pointer hover:text-emerald-700 hover:underline"
                  onclick="pickResultClick('{{ word }}')">{{ word }}</span>
            {% endfor %}
        </div>
    </div>
    {% else %}
    <div class="rounded px-3 py-2 bg-gray-50 border border-gray-200 text-gray-500">
        No matches found.
    </div>
    {% endif %}

</div>
