{# Admin save confirmation — auto-dismisses after 2s #}
<div class="mt-2 rounded px-3 py-2 text-sm bg-green-50 border border-green-200 text-green-800"
     onload="setTimeout(function(){this.remove()},2000)"
     id="save-flash">
    {% if changes %}
    Saved: {{ changes | join(', ') }}{% if grid_rebuilt %} (grid rebuilt){% endif %}
    {% else %}
    No changes detected.
    {% endif %}
</div>
<script>setTimeout(function(){var el=document.getElementById('save-flash');if(el)el.remove();},2000)</script>
