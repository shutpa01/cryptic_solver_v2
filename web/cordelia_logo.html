<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cordelia — Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: white;
    border-radius: 24px;
    padding: 2.5rem 3rem 2.5rem 2.5rem;
    box-shadow: 0 4px 40px rgba(0,0,0,0.07);
    max-width: 760px;
  }
  .char-col {
    flex: 0 0 240px;
    position: relative;
    height: 260px;
  }
  .char-col img {
    width: 240px;
    height: 240px;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
    display: block;
    outline: 4px solid transparent;
    outline-offset: 3px;
    box-shadow: 0 0 0 4px white, 0 0 0 7px #FFD700, 0 0 0 9px #FF6B9D;
  }
  .tile {
    position: absolute;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-size: 18px;
    font-weight: 700;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  }
  .t1 { background:#FFD700; color:#1a1a2e; top:-10px; left:30px;  transform:rotate(-10deg); }
  .t2 { background:#FF6B9D; color:#fff;    top:10px;  right:2px;  transform:rotate(8deg);  }
  .t3 { background:#7C4DFF; color:#fff;    bottom:18px; left:-4px; transform:rotate(-7deg); }
  .t4 { background:#00C8FF; color:#1a1a2e; bottom:5px;  right:6px;  transform:rotate(9deg);  }

  .brand-col {
    flex: 1;
    padding-left: 2.5rem;
  }
  .brand-name {
    font-family: Georgia, serif;
    font-size: 68px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .stripes {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .stripe {
    height: 5px;
    flex: 1;
    border-radius: 3px;
  }
  .tagline {
    font-family: Arial, sans-serif;
    font-size: 10.5px;
    letter-spacing: 4px;
    color: #999;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .sub {
    font-family: Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: #ccc;
    margin-bottom: 22px;
  }
  .grid-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .gc {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-size: 11px;
    font-weight: 700;
  }
  .gf { color: white; }
  .ge { border: 1.5px solid #e0e0e0; color: #ddd; background: white; }
</style>
</head>
